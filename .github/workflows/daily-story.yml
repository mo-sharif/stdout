name: daily story
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: daily-story
  cancel-in-progress: false
jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AI_BASE_URL: ${{ vars.AI_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta/openai' }}
      AI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.AI_API_KEY }}
      BRAIN_MODEL: ${{ vars.BRAIN_MODEL || vars.AI_MODEL || 'gemini-3.5-flash' }}
      VERIFY_MODEL: ${{ vars.VERIFY_MODEL || vars.AI_VERIFY_MODEL || vars.AI_MODEL || 'gemini-3.5-flash' }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      # zero runtime deps — brain, build and tests run on plain node, no npm install
      - run: node --test
      - name: generate, build, open review PR
        run: node pipeline/daily.mjs
